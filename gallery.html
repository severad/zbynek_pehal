<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrade - Journal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

<div class="l-navbar" id="nav-bar">
    <nav class="nav">
        <div>
            <a href="#" class="nav_logo"><img src="img/LOGO%20MP.png" class="nav_logo-img" alt="EduTrade logo"><span class="nav_logo-name">EduTrade</span></a>
            <div class="nav_list">
                <a href="dashboard.html" class="nav_link"><i class='bx bx-grid-alt nav_icon'></i><span class="nav_name" data-i18n="nav-dashboard">Dashboard</span></a>
                <a href="trades.html" class="nav_link"><i class='bx bx-dollar-circle nav_icon'></i><span class="nav_name" data-i18n="nav-trades">Trades</span></a>
                <a href="statistics.html" class="nav_link"><i class='bx bx-bar-chart-alt-2 nav_icon'></i><span class="nav_name" data-i18n="nav-stats">Statistics</span></a>
                <a href="gallery.html" class="nav_link active"><i class='bx bx-image nav_icon'></i><span class="nav_name" data-i18n="nav-gallery">Journal</span></a>
            </div>
        </div>
    </nav>
</div>

<header class="header" id="header">
    <div class="header_toggle"><i class='bx bx-menu' id="header-toggle"></i></div>

    <div class="header_right">
        <div class="dropdown lang-switch">
            <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown" id="active-lang">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> CZ
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item lang-item" href="#" data-lang="cz"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> Cestina</a></li>
                <li><a class="dropdown-item lang-item" href="#" data-lang="en"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/ae/Flag_of_the_United_Kingdom.svg/330px-Flag_of_the_United_Kingdom.svg.png"> English</a></li>
            </ul>
        </div>

        <div class="btn-group" style="width: 160px">
            <button type="button" class="dropdown-toggle btn-user" data-bs-toggle="dropdown">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/250px-Default_pfp.svg.png" alt="User">
                <span>Zbynek</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="settings.html"><i class='bx bx-cog'></i> <span data-i18n="nav-settings">Settings</span></a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="index.html"><i class='bx bx-log-out'></i> <span data-i18n="logout">Logout</span></a></li>
            </ul>
        </div>
    </div>
</header>

<main id="body-pd" class="p-4 body-pd">
    <div class="mb-4"><h2 data-i18n="gallery-title-main">Journal</h2></div>

    <div class="card section-card mb-4">
        <h5 data-i18n="gallery-add-title">Record Your Trade</h5>
        <div class="mt-3 journal-upload-box">
            <input type="file" id="imageInput" accept="image/*" multiple class="d-none">
            <div id="selectedFilesText" class="small mb-3 journal-file-status" data-i18n="journal-no-file">No file selected</div>
            <div class="journal-upload-actions">
                <button class="btn journal-btn journal-btn-secondary" id="openFilePickerBtn" data-i18n="journal-pick-btn">Choose Trade Screenshots</button>
                <button class="btn journal-btn journal-btn-primary" id="addImageBtn" data-i18n="gallery-add-btn">Save Trade Record</button>
            </div>
        </div>
    </div>

    <div class="card section-card">
        <h5 data-i18n="gallery-your-title">Your Journal Entries</h5>
        <div class="row mt-3" id="galleryContainer"></div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>
