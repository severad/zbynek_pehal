<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrade - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light auth-page">
<div class="auth-brand">
    <img src="img/LOGO%20MP.png" alt="EduTrade logo">
</div>
<div class="auth-toolbar">
    <div class="auth-lang">
        <button type="button" class="btn lang-btn" id="active-lang">CZ</button>
        <a href="#" class="lang-item" data-lang="cz">CZ</a>
        <a href="#" class="lang-item" data-lang="en">EN</a>
    </div>
    <button type="button" class="auth-action-btn" id="authThemeToggle" data-i18n="auth-theme-btn">Změnit pozadí</button>
    <a href="about.html" class="auth-action-btn" data-i18n="auth-about-btn">Návod/Tutoriál</a>
</div>

<div class="auth-overlay"></div>
<div class="container auth-shell d-flex align-items-center">
    <div class="auth-layout">
        <div class="auth-copy">
            <h1 class="auth-hero-title" data-i18n="auth-hero-title">EduTrade</h1>
            <p class="auth-hero-subtitle" data-i18n="auth-hero-subtitle">Vždy se můžeš zlepšit</p>
        </div>

        <div class="card p-4 shadow auth-card" style="width: 100%; max-width: 430px;">
            <h2 class="text-center mb-1" data-i18n="register-title">Register</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="email" class="form-label" data-i18n="email">Email</label>
                    <input type="email" class="form-control" id="email" data-i18n-placeholder="email-placeholder" placeholder="enter email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label" data-i18n="password">Password</label>
                    <input type="password" class="form-control" id="password" data-i18n-placeholder="password-placeholder" placeholder="enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" data-i18n="register-btn">Create account</button>
            </form>
            <p class="mt-3 text-center"><span data-i18n="has-account">Already have an account?</span> <a href="index.html" data-i18n="login-link">Sign in</a></p>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
