<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrade - Video</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light auth-page">
<div class="auth-brand">
    <img src="img/LOGO%20MP.png" alt="EduTrade logo">
</div>
<a href="index.html" class="auth-close-btn" aria-label="Zavrit">×</a>

<div class="auth-overlay"></div>
<main class="container auth-shell d-flex align-items-center">
    <div class="auth-layout" style="max-width: 980px;">
        <div class="card p-4 shadow auth-card w-100">
            <h2 class="mb-2" data-i18n="auth-about-btn">Video</h2>
            <video id="aboutVideo" controls style="width: 100%; border-radius: 12px; background: #000;" preload="metadata">
                <source src="vid/Video%20MP.mp4" type="video/mp4">
                Tvuj prohlizec nepodporuje video tag.
            </video>
            <div class="mt-3 d-flex justify-content-end">
                <button type="button" class="btn btn-outline-primary" id="videoVolumeToggle">Ztlumit zvuk</button>
            </div>
        </div>
    </div>
</main>
<script src="js/script.js"></script>
</body>
</html>
