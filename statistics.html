<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statistics - Trading Journal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">

<div class="l-navbar" id="nav-bar">
    <nav class="nav">
        <div>
            <a href="#" class="nav_logo"><img src="img/LOGO%20MP.png" class="nav_logo-img" alt="EduTrade logo"><span class="nav_logo-name">EduTrade</span></a>
            <div class="nav_list">
                <a href="dashboard.html" class="nav_link"><i class='bx bx-grid-alt nav_icon'></i><span class="nav_name" data-i18n="nav-dashboard">Dashboard</span></a>
                <a href="trades.html" class="nav_link"><i class='bx bx-dollar-circle nav_icon'></i><span class="nav_name" data-i18n="nav-trades">Trades</span></a>
                <a href="statistics.html" class="nav_link active"><i class='bx bx-bar-chart-alt-2 nav_icon'></i><span class="nav_name" data-i18n="nav-stats">Statistics</span></a>
                <a href="gallery.html" class="nav_link"><i class='bx bx-image nav_icon'></i><span class="nav_name" data-i18n="nav-gallery">Gallery</span></a>
            </div>
        </div>
    </nav>
</div>

<header class="header" id="header">
    <div class="header_toggle"><i class='bx bx-menu' id="header-toggle"></i></div>
    <div class="header_right">
        <div class="dropdown lang-switch">
            <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown" id="active-lang">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> CZ
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item lang-item" href="#" data-lang="cz"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> Cestina</a></li>
                <li><a class="dropdown-item lang-item" href="#" data-lang="en"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/ae/Flag_of_the_United_Kingdom.svg/330px-Flag_of_the_United_Kingdom.svg.png"> English</a></li>
            </ul>
        </div>
        <div class="btn-group" style="width: 160px">
            <button type="button" class="dropdown-toggle btn-user" data-bs-toggle="dropdown">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/250px-Default_pfp.svg.png" alt="User">
                <span>Zbynek</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="settings.html"><i class='bx bx-cog'></i> <span data-i18n="nav-settings">Settings</span></a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="index.html"><i class='bx bx-log-out'></i> <span data-i18n="logout">Logout</span></a></li>
            </ul>
        </div>
    </div>
</header>

<main id="body-pd" class="p-4 body-pd">
    <div class="stats-topbar d-flex justify-content-between align-items-start mb-4">
        <div>
            <h2 data-i18n="stats-title-main">Statistics</h2>
            <div class="stats-range text-muted" data-i18n="stats-alltime">All Time</div>
        </div>
        <button class="btn-sync" id="syncBtn"><i class='bx bx-refresh'></i> <span data-i18n="stats-sync">Sync</span></button>
    </div>

    <div class="card section-card mb-4">
        <div class="stats-grid">
            <div class="stat-box"><div class="label" data-i18n="stats-best">Best Trade <i class="bx bx-info-circle info-tip" data-i18n-title="tip-best-trade"></i></div><p class="value text-success" id="val-best">+$0.00</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-worst">Worst Trade <i class="bx bx-info-circle info-tip" data-i18n-title="tip-worst-trade"></i></div><p class="value text-danger" id="val-worst">-$0.00</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-avgwin">Avg. Win <i class="bx bx-info-circle info-tip" data-i18n-title="tip-avg-win"></i></div><p class="value text-success" id="val-avgwin">+$0.00</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-avgloss">Avg. Loss <i class="bx bx-info-circle info-tip" data-i18n-title="tip-avg-loss"></i></div><p class="value text-danger" id="val-avgloss">-$0.00</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-trades">No. of Trades <i class="bx bx-info-circle info-tip" data-i18n-title="tip-number-of-trades"></i></div><p class="value" id="val-trades">0</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-contracts">Contracts <i class="bx bx-info-circle info-tip" data-i18n-title="tip-contracts"></i></div><p class="value" id="val-contracts">0</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-winrate">Win Rate <i class="bx bx-info-circle info-tip" data-i18n-title="tip-winrate"></i></div><p class="value" id="val-winrate">0%</p></div>
            <div class="stat-box"><div class="label" data-i18n="stats-pf">Profit Factor <i class="bx bx-info-circle info-tip" data-i18n-title="tip-profit-factor"></i></div><p class="value" id="val-pf">0.00</p></div>
        </div>
    </div>

    <div class="card section-card">
        <h5 class="chart-title mb-3" data-i18n="stats-equity">Equity Curve <i class="bx bx-info-circle info-tip" data-i18n-title="tip-equity-curve"></i></h5>
        <div style="position: relative; height:300px;"><canvas id="equityChart"></canvas></div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
