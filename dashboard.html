<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrade Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">

<div class="l-navbar" id="nav-bar">
    <nav class="nav">
        <div>
            <a href="#" class="nav_logo">
                <img src="img/LOGO%20MP.png" class="nav_logo-img" alt="EduTrade logo">
                <span class="nav_logo-name">EduTrade</span>
            </a>
            <div class="nav_list">
                <a href="dashboard.html" class="nav_link active">
                    <i class='bx bx-grid-alt nav_icon'></i>
                    <span class="nav_name" data-i18n="nav-dashboard">Dashboard</span>
                </a>
                <a href="trades.html" class="nav_link">
                    <i class='bx bx-dollar-circle nav_icon'></i>
                    <span class="nav_name" data-i18n="nav-trades">Trades</span>
                </a>
                <a href="statistics.html" class="nav_link">
                    <i class='bx bx-bar-chart-alt-2 nav_icon'></i>
                    <span class="nav_name" data-i18n="nav-stats">Statistics</span>
                </a>
                <a href="gallery.html" class="nav_link">
                    <i class='bx bx-image nav_icon'></i>
                    <span class="nav_name" data-i18n="nav-gallery">Gallery</span>
                </a>
            </div>
        </div>
    </nav>
</div>

<header class="header" id="header">
    <div class="header_toggle">
        <i class='bx bx-menu' id="header-toggle"></i>
    </div>

    <div class="header_right">
        <div class="dropdown lang-switch">
            <button class="btn lang-btn dropdown-toggle" data-bs-toggle="dropdown" id="active-lang">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> CZ
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item lang-item" href="#" data-lang="cz"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_Czech_Republic.svg/330px-Flag_of_the_Czech_Republic.svg.png"> Cestina</a></li>
                <li><a class="dropdown-item lang-item" href="#" data-lang="en"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/ae/Flag_of_the_United_Kingdom.svg/330px-Flag_of_the_United_Kingdom.svg.png"> English</a></li>
            </ul>
        </div>

        <div class="btn-group" style="width: 160px">
            <button type="button" class="dropdown-toggle btn-user" data-bs-toggle="dropdown">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/250px-Default_pfp.svg.png" alt="User">
                <span id="user-name-display">Zbynek</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="settings.html"><i class='bx bx-cog'></i> <span data-i18n="nav-settings">Settings</span></a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="index.html"><i class='bx bx-log-out'></i> <span data-i18n="logout">Logout</span></a></li>
            </ul>
        </div>
    </div>
</header>

<main class="flex-grow-1 p-4 body-pd" id="body-pd">
    <div class="mb-4">
        <h2 id="title-dashboard" data-i18n="dashboard-title">Trading Journal Dashboard</h2>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-3 mb-3">
            <div class="card stat-card">
                <h6 data-i18n="total-pl">Total P/L <i class="bx bx-info-circle info-tip" data-i18n-title="tip-total-pl"></i></h6>
                <h4 class="text-success" id="totalPL">+185 USD</h4>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card stat-card">
                <h6 data-i18n="winrate">Winrate <i class="bx bx-info-circle info-tip" data-i18n-title="tip-winrate"></i></h6>
                <h4 id="winrate">66 %</h4>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card stat-card">
                <h6 data-i18n="avg-win">Average Win <i class="bx bx-info-circle info-tip" data-i18n-title="tip-avg-win"></i></h6>
                <h4 id="avgWin">+122 USD</h4>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card stat-card">
                <h6 data-i18n="avg-loss">Average Loss <i class="bx bx-info-circle info-tip" data-i18n-title="tip-avg-loss"></i></h6>
                <h4 class="text-danger" id="avgLoss">-60 USD</h4>
            </div>
        </div>
    </div>

    <div class="card section-card mb-4">
        <h5 class="chart-title mb-3" data-i18n="equity-curve">Equity Curve <i class="bx bx-info-circle info-tip" data-i18n-title="tip-equity-curve"></i></h5>
        <div style="position: relative; height:300px;">
            <canvas id="equityChart"></canvas>
        </div>
    </div>

    <div class="card section-card">
        <h5 data-i18n="trades-overview">Trades Overview</h5>
        <table class="table table-hover mt-3">
            <thead>
                <tr>
                    <th data-i18n="th-date">Date <i class="bx bx-info-circle info-tip" data-i18n-title="tip-date"></i></th>
                    <th data-i18n="th-instrument">Instrument <i class="bx bx-info-circle info-tip" data-i18n-title="tip-instrument"></i></th>
                    <th data-i18n="th-direction">Direction <i class="bx bx-info-circle info-tip" data-i18n-title="tip-direction"></i></th>
                    <th data-i18n="th-pl">P/L <i class="bx bx-info-circle info-tip" data-i18n-title="tip-pl"></i></th>
                </tr>
            </thead>
            <tbody id="dashboardTradesBody"></tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
